<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillHire | Admin & Smart Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .admin-gradient { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Shared Initial Data
        const INITIAL_JOBS = [
            { id: 1, title: "Lead React Developer", company: "Meta", skills: ["React", "TypeScript", "Tailwind"], salary: "$160k" },
            { id: 2, title: "Backend Engineer", company: "Stripe", skills: ["Node.js", "Express", "PostgreSQL"], salary: "$145k" }
        ];

        function App() {
            // App Flow: 'login' | 'onboarding' | 'portal' | 'admin'
            const [step, setStep] = useState('login');
            const [role, setRole] = useState(null); // 'user' | 'admin'
            const [user, setUser] = useState({ name: '', skills: [] });
            const [jobs, setJobs] = useState(INITIAL_JOBS);

            // --- 1. SEAMLESS LOGIN ---
            const LoginView = () => (
                <div className="min-h-screen flex items-center justify-center p-6 fade-in">
                    <div className="max-w-md w-full bg-white rounded-[2rem] shadow-2xl p-10 border border-slate-100">
                        <div className="text-center mb-10">
                            <div className="inline-block p-4 bg-indigo-600 rounded-2xl mb-4 shadow-xl shadow-indigo-100 text-white">
                                <i data-lucide="layout-grid"></i>
                            </div>
                            <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">SkillHire Portal</h1>
                            <p className="text-slate-500 mt-2">Choose your path to get started</p>
                        </div>
                        <div className="space-y-4">
                            <button onClick={() => { setRole('user'); setStep('onboarding'); }} 
                                className="w-full group p-5 bg-slate-50 hover:bg-indigo-50 border-2 border-transparent hover:border-indigo-200 rounded-2xl flex items-center justify-between transition-all">
                                <div className="flex items-center gap-4">
                                    <div className="p-3 bg-white rounded-xl text-indigo-600 shadow-sm"><i data-lucide="user"></i></div>
                                    <div className="text-left">
                                        <p className="font-bold text-slate-900">Job Seeker</p>
                                        <p className="text-xs text-slate-500">Find jobs with AI matching</p>
                                    </div>
                                </div>
                                <i data-lucide="chevron-right" className="text-slate-300 group-hover:text-indigo-500"></i>
                            </button>

                            <button onClick={() => { setRole('admin'); setStep('admin'); }} 
                                className="w-full group p-5 bg-slate-50 hover:bg-slate-900 hover:text-white border-2 border-transparent rounded-2xl flex items-center justify-between transition-all">
                                <div className="flex items-center gap-4">
                                    <div className="p-3 bg-white rounded-xl text-slate-900 shadow-sm"><i data-lucide="briefcase"></i></div>
                                    <div className="text-left">
                                        <p className="font-bold">Employer / Admin</p>
                                        <p className="text-xs opacity-60">Post jobs & manage listings</p>
                                    </div>
                                </div>
                                <i data-lucide="chevron-right" className="opacity-30"></i>
                            </button>
                        </div>
                    </div>
                </div>
            );

            // --- 2. USER ONBOARDING ---
            const OnboardingView = () => {
                const [input, setInput] = useState({ name: '', skills: '' });
                const proceed = (e) => {
                    e.preventDefault();
                    setUser({ name: input.name, skills: input.skills.split(',').map(s => s.trim()) });
                    setStep('portal');
                };
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 fade-in">
                        <form onSubmit={proceed} className="max-w-md w-full bg-white rounded-[2rem] shadow-xl p-10 space-y-6">
                            <h2 className="text-2xl font-black">Tell us about you</h2>
                            <div>
                                <label className="text-[10px] font-black uppercase text-slate-400 ml-1 tracking-widest">Full Name</label>
                                <input required className="w-full mt-1 p-4 bg-slate-50 rounded-xl outline-none border border-slate-100 focus:border-indigo-500" 
                                    placeholder="Enter your name" onChange={e => setInput({...input, name: e.target.value})} />
                            </div>
                            <div>
                                <label className="text-[10px] font-black uppercase text-slate-400 ml-1 tracking-widest">Skills (Comma Separated)</label>
                                <textarea required className="w-full mt-1 p-4 bg-slate-50 rounded-xl outline-none border border-slate-100 focus:border-indigo-500 h-24" 
                                    placeholder="e.g. React, JavaScript, CSS" onChange={e => setInput({...input, skills: e.target.value})}></textarea>
                            </div>
                            <button className="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold shadow-lg shadow-indigo-100">See Matching Jobs</button>
                        </form>
                    </div>
                );
            };

            // --- 3. ADMIN DASHBOARD (POST JOBS) ---
            const AdminDashboard = () => {
                const [newJob, setNewJob] = useState({ title: '', company: '', skills: '', salary: '' });
                
                const handlePost = (e) => {
                    e.preventDefault();
                    const jobEntry = {
                        ...newJob,
                        id: Date.now(),
                        skills: newJob.skills.split(',').map(s => s.trim())
                    };
                    setJobs([jobEntry, ...jobs]);
                    setNewJob({ title: '', company: '', skills: '', salary: '' });
                    alert("Job Posted Successfully!");
                };

                const deleteJob = (id) => setJobs(jobs.filter(j => j.id !== id));

                return (
                    <div className="min-h-screen flex flex-col md:flex-row fade-in">
                        {/* Admin Sidebar */}
                        <div className="w-full md:w-80 admin-gradient text-white p-8">
                            <div className="flex items-center gap-3 mb-10">
                                <div className="bg-white/10 p-2 rounded-lg"><i data-lucide="shield"></i></div>
                                <h2 className="font-black tracking-tighter text-xl">ADMIN PANEL</h2>
                            </div>
                            <h3 className="text-sm font-bold opacity-50 mb-6 uppercase">Post a New Job</h3>
                            <form onSubmit={handlePost} className="space-y-4">
                                <input required className="w-full p-3 bg-white/5 border border-white/10 rounded-lg text-sm" placeholder="Job Title" value={newJob.title} onChange={e => setNewJob({...newJob, title: e.target.value})} />
                                <input required className="w-full p-3 bg-white/5 border border-white/10 rounded-lg text-sm" placeholder="Company" value={newJob.company} onChange={e => setNewJob({...newJob, company: e.target.value})} />
                                <input required className="w-full p-3 bg-white/5 border border-white/10 rounded-lg text-sm" placeholder="Skills (Comma sep)" value={newJob.skills} onChange={e => setNewJob({...newJob, skills: e.target.value})} />
                                <input required className="w-full p-3 bg-white/5 border border-white/10 rounded-lg text-sm" placeholder="Salary (e.g. $100k)" value={newJob.salary} onChange={e => setNewJob({...newJob, salary: e.target.value})} />
                                <button className="w-full py-3 bg-white text-slate-900 rounded-lg font-bold hover:bg-indigo-400 transition-colors">Post Listing</button>
                                <button type="button" onClick={()=>setStep('login')} className="w-full py-3 bg-red-500/20 text-red-400 rounded-lg font-bold text-xs mt-4">Exit Admin</button>
                            </form>
                        </div>
                        {/* Admin Main Content */}
                        <div className="flex-1 p-8 md:p-12">
                            <h2 className="text-3xl font-black mb-8 text-slate-800">Manage Active Listings</h2>
                            <div className="grid gap-4">
                                {jobs.map(job => (
                                    <div key={job.id} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex justify-between items-center">
                                        <div>
                                            <h4 className="font-bold text-lg">{job.title}</h4>
                                            <p className="text-sm text-slate-500">{job.company} • {job.skills.join(', ')}</p>
                                        </div>
                                        <button onClick={() => deleteJob(job.id)} className="text-red-500 p-2 hover:bg-red-50 rounded-lg"><i data-lucide="trash-2"></i></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            // --- 4. JOB SEEKER PORTAL ---
            const UserPortal = () => {
                const getMatch = (jobSkills) => {
                    const match = jobSkills.filter(s => user.skills.some(us => us.toLowerCase() === s.toLowerCase()));
                    return Math.round((match.length / jobSkills.length) * 100);
                };

                return (
                    <div className="min-h-screen fade-in">
                        <nav className="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center">
                            <h1 className="text-xl font-black tracking-tighter">SKILL<span className="text-indigo-600">HIRE</span></h1>
                            <div className="flex items-center gap-4">
                                <div className="text-right"><p className="text-sm font-bold leading-none">{user.name}</p></div>
                                <button onClick={()=>setStep('login')} className="text-slate-400"><i data-lucide="log-out"></i></button>
                            </div>
                        </nav>
                        <div className="max-w-4xl mx-auto px-6 py-12">
                            <h2 className="text-3xl font-black text-slate-900 mb-2">Matching Jobs</h2>
                            <p className="text-slate-500 mb-10">AI-ranked opportunities based on your profile.</p>
                            <div className="space-y-6">
                                {jobs.map(job => {
                                    const score = getMatch(job.skills);
                                    return (
                                        <div key={job.id} className="bg-white p-8 rounded-[2rem] border border-slate-100 flex flex-col md:flex-row justify-between items-center hover:shadow-xl transition-all">
                                            <div className="flex-1 w-full">
                                                <span className="text-indigo-600 font-bold text-[10px] uppercase tracking-widest">{job.company}</span>
                                                <h3 className="text-2xl font-bold text-slate-900 mb-3">{job.title}</h3>
                                                <div className="flex flex-wrap gap-2">
                                                    {job.skills.map(s => (
                                                        <span key={s} className={`px-3 py-1 rounded-full text-[10px] font-bold ${user.skills.some(us => us.toLowerCase() === s.toLowerCase()) ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-400'}`}>
                                                            {s}
                                                        </span>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="mt-6 md:mt-0 md:ml-8 flex flex-col items-center">
                                                <div className={`w-20 h-20 rounded-full border-[6px] flex flex-col items-center justify-center ${score > 50 ? 'border-emerald-400 text-emerald-600' : 'border-slate-200 text-slate-400'}`}>
                                                    <span className="text-xl font-black">{score}%</span>
                                                </div>
                                                <span className="text-[10px] mt-2 font-bold uppercase text-slate-400 tracking-tighter">Match Mark</span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            };

            useEffect(() => { lucide.createIcons(); }, [step]);

            return (
                <div>
                    {step === 'login' && <LoginView />}
                    {step === 'onboarding' && <OnboardingView />}
                    {step === 'portal' && <UserPortal />}
                    {step === 'admin' && <AdminDashboard />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
